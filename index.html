<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVERNO</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      padding: 20px;
      animation: fadeIn 1.5s ease-in-out;
    }

    .logo {
      font-size: 3.2rem;
      letter-spacing: 14px;
      font-weight: 500;
      margin-bottom: 15px;
      position: relative;
    }

    .logo::after {
      content: "INVERNO";
      position: absolute;
      left: 0;
      top: 0;
      color: rgba(255,255,255,0.08);
      filter: blur(8px);
      z-index: -1;
    }

    .tagline {
      font-size: 0.9rem;
      letter-spacing: 6px;
      color: #aaa;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      letter-spacing: 3px;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .logo {
        font-size: 2rem;
        letter-spacing: 8px;
      }

      .tagline {
        font-size: 0.7rem;
        letter-spacing: 4px;
      }

      .btn {
        padding: 10px 20px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">INVERNO</div>
    <div class="tagline">COMING SOON</div>

    <!-- Instagram Button -->
    <a href="https://instagram.com/inverno.clothing" target="_blank" class="btn">
      FOLLOW ON INSTAGRAM
    </a>
  </div>

</body>
</html>
